# Docker Compose for SQLite-only setup (simpler, no PostgreSQL)
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: affiliate-network
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - CSRF_SECRET=${CSRF_SECRET}
      - CLIENT_URL=${CLIENT_URL:-https://your-domain.com}
      - BASE_URL=${BASE_URL:-https://your-domain.com}
      - DATABASE_TYPE=sqlite
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - app-data:/app/data
      - app-backups:/app/backups
    networks:
      - affiliate-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: affiliate-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - affiliate-network

  certbot:
    image: certbot/certbot
    container_name: affiliate-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  backup:
    image: alpine:latest
    container_name: affiliate-backup
    volumes:
      - app-data:/data:ro
      - app-backups:/backups
    environment:
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    entrypoint: |
      /bin/sh -c '
        apk add --no-cache sqlite
        while true; do
          echo "Starting backup at $$(date)"
          if [ -f /data/affiliate.db ]; then
            sqlite3 /data/affiliate.db ".backup /backups/sqlite_$$(date +%Y%m%d_%H%M%S).db"
          fi
          find /backups -name "*.db" -mtime +$${BACKUP_RETENTION_DAYS} -delete
          echo "Backup completed at $$(date)"
          sleep 86400
        done
      '
    networks:
      - affiliate-network

volumes:
  app-data:
  app-backups:

networks:
  affiliate-network:
    driver: bridge
